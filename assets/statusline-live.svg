<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 72" width="880" height="72" role="img" aria-labelledby="title">
  <title id="title">A live status line ticking from 32% green to 78% yellow to 91% red over 4 seconds.</title>
  <style>
    .bg { fill: #FAF8F3; }
    .mono { font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace; font-size: 20px; fill: #1A1A1A; }
    .sep { fill: #8A8A8A; }
    @media (prefers-reduced-motion: reduce) {
      animate, set { animation-play-state: paused; }
    }
  </style>

  <rect class="bg" width="880" height="72" />

  <!-- Left color bar (ticks green → yellow → red) -->
  <rect x="0" y="0" width="6" height="72" fill="#3F7A3F">
    <animate attributeName="fill"
             values="#3F7A3F;#B8860B;#A13A2F;#3F7A3F"
             keyTimes="0;0.333;0.666;1"
             dur="4s" repeatCount="indefinite" />
  </rect>

  <!-- Model -->
  <text class="mono" x="28" y="44">Opus 4.7</text>
  <text class="sep mono" x="118" y="44">|</text>

  <!-- Project slug (stays 'workspace' — single session climbing) -->
  <text class="mono" x="138" y="44">workspace</text>
  <text class="sep mono" x="258" y="44">|</text>

  <!-- Percent + emoji tick -->
  <text class="mono" x="278" y="44">
    <tspan>🟢 32%</tspan>
    <set attributeName="textContent" to="🟡 78%" begin="1.333s" />
    <set attributeName="textContent" to="🔴 91%" begin="2.666s" />
    <set attributeName="textContent" to="🟢 32%" begin="4s" />
    <animate attributeName="opacity"
             values="1;1;1;1"
             dur="4s" repeatCount="indefinite" />
  </text>
  <text class="sep mono" x="408" y="44">|</text>

  <!-- Cost -->
  <text class="mono" x="428" y="44">
    <tspan>$0.470</tspan>
    <set attributeName="textContent" to="$2.120" begin="1.333s" />
    <set attributeName="textContent" to="$5.100" begin="2.666s" />
    <set attributeName="textContent" to="$0.470" begin="4s" />
  </text>
</svg>
