<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" width="880" height="560" role="img" aria-labelledby="maxtitle">
  <title id="maxtitle">A Claude Code session maxxed out — 200k of 200k tokens used, autocompact imminent, context overflowing the window.</title>
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A13A2F" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#A13A2F" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#A13A2F" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="laptop-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <filter id="redshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
  </defs>

  <style>
    .bg      { fill: #F5F1EB; }
    .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .sans    { font-family: 'Inter', -apple-system, sans-serif; }
    .serif   { font-family: 'Playfair Display', Georgia, serif; }
    .dim     { fill: #8A8A8A; }
    .text-w  { fill: #EDE8E0; }
    .text-mid{ fill: #9A9A9A; }
    .red     { fill: #A13A2F; }
    .red-br  { fill: #D85A4F; }
    .yellow  { fill: #B8860B; }
    .amber   { fill: #E8B84B; }
  </style>

  <!-- Page background -->
  <rect class="bg" width="880" height="560"/>

  <!-- Top-left caption -->
  <text class="sans dim" x="40" y="42" font-size="11" letter-spacing="2.5">CONTEXT WINDOW — MAXXED</text>

  <!-- Red ambient glow behind laptop -->
  <ellipse cx="440" cy="320" rx="360" ry="140" fill="url(#glow)"/>

  <!-- Laptop base / stand shadow -->
  <ellipse cx="440" cy="510" rx="260" ry="8" fill="#000" opacity="0.12"/>

  <!-- Laptop body -->
  <rect x="140" y="110" width="600" height="380" rx="10" fill="url(#laptop-body)"/>
  <!-- Hinge band -->
  <rect x="140" y="488" width="600" height="6" fill="#0F0F0F"/>
  <!-- Screen bezel -->
  <rect x="160" y="128" width="560" height="346" rx="4" fill="#0F0F0F"/>
  <!-- Screen -->
  <rect x="168" y="136" width="544" height="330" fill="#141414"/>

  <!-- Top chrome / tab -->
  <rect x="168" y="136" width="544" height="28" fill="#0F0F0F"/>
  <circle cx="184" cy="150" r="4.5" fill="#FF5F57"/>
  <circle cx="200" cy="150" r="4.5" fill="#FEBC2E"/>
  <circle cx="216" cy="150" r="4.5" fill="#28C840"/>
  <text class="mono text-mid" x="240" y="154" font-size="11">claude-code — workspace — 99%</text>

  <!-- Warning strip -->
  <rect x="168" y="164" width="544" height="22" fill="#2A1414"/>
  <rect x="168" y="164" width="3" height="22" fill="#D85A4F"/>
  <text class="mono red-br" x="186" y="179" font-size="11">⚠  AUTOCOMPACT IMMINENT — 400 tokens to buffer</text>

  <!-- Body text (pseudo-code / transcript) -->
  <g class="mono" font-size="11">
    <text class="text-mid" x="186" y="210">$ claude --resume</text>
    <text class="dim"      x="186" y="228">└─ restoring context from previous session …</text>
    <text class="text-w"   x="186" y="250">▌ You: finish the refactor we started in</text>
    <text class="text-w"   x="186" y="266">  <tspan class="dim">src/engine/ — the one with the</tspan></text>
    <text class="text-w"   x="186" y="282">  <tspan class="dim">rate limiter. Pick up where you</tspan></text>
    <text class="text-w"   x="186" y="298">  <tspan class="dim">left off.</tspan></text>

    <text class="dim"      x="186" y="324">▌ Claude: context window full. Compacting</text>
    <text class="red-br"   x="186" y="340">  older messages to recover space …</text>
    <text class="red-br"   x="186" y="356">  ⚠ lost: 3 file contents, 2 tool results</text>
    <text class="red-br"   x="186" y="372">  ⚠ lost: design decisions from turn 14</text>

    <text class="text-mid" x="186" y="398">▌ Claude: I don't have the rate limiter</text>
    <text class="text-mid" x="186" y="414">  context. Could you share the file again?</text>
  </g>

  <!-- Bottom statusline inside laptop -->
  <rect x="168" y="434" width="544" height="32" fill="#0A0A0A"/>
  <rect x="168" y="434" width="3"   height="32" fill="#A13A2F"/>
  <g class="mono" font-size="12">
    <text class="text-w"  x="186" y="455">Opus 4.7</text>
    <text class="dim"     x="248" y="455">|</text>
    <text class="text-w"  x="260" y="455">workspace</text>
    <text class="dim"     x="338" y="455">|</text>
    <text class="red-br"  x="350" y="455">🔴 99%</text>
    <text class="dim"     x="412" y="455">|</text>
    <text class="text-w"  x="424" y="455">199.6k / 200k</text>
    <text class="dim"     x="530" y="455">|</text>
    <text class="red-br"  x="542" y="455">$5.840</text>
  </g>

  <!-- Overflow bar: context spilling past the screen -->
  <rect x="168" y="470" width="544" height="4" fill="#2A1414"/>
  <rect x="168" y="470" width="540" height="4" fill="#A13A2F"/>
  <!-- The spill-off -->
  <rect x="708" y="470" width="52"  height="4" fill="#D85A4F"/>
  <text class="mono red" x="716" y="468" font-size="9">+0.4k over</text>

  <!-- Floating overflow chips escaping the window -->
  <g opacity="0.9">
    <rect x="738" y="220" width="92" height="18" rx="2" fill="#A13A2F"/>
    <text class="mono" x="744" y="233" font-size="10" fill="#F5F1EB">lost: turn-14</text>

    <rect x="758" y="256" width="80" height="18" rx="2" fill="#A13A2F" opacity="0.8"/>
    <text class="mono" x="764" y="269" font-size="10" fill="#F5F1EB">lost: MCP</text>

    <rect x="746" y="292" width="102" height="18" rx="2" fill="#A13A2F" opacity="0.6"/>
    <text class="mono" x="752" y="305" font-size="10" fill="#F5F1EB">lost: plan.md</text>

    <rect x="30" y="240" width="88" height="18" rx="2" fill="#A13A2F" opacity="0.75"/>
    <text class="mono" x="36" y="253" font-size="10" fill="#F5F1EB">lost: diff</text>

    <rect x="20" y="276" width="106" height="18" rx="2" fill="#A13A2F" opacity="0.55"/>
    <text class="mono" x="26" y="289" font-size="10" fill="#F5F1EB">lost: skill def</text>
  </g>

  <!-- Caption bottom-right -->
  <text class="serif" x="840" y="538" font-size="14" fill="#5A5A5A" text-anchor="end" font-style="italic">The 200k wall.</text>
</svg>
