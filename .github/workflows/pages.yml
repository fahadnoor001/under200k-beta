name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  administration: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Pages is enabled
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          status=$(curl -s -o /tmp/pages.json -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/pages" \
            -d '{"build_type":"workflow"}') || true
          echo "POST /pages → HTTP $status"
          cat /tmp/pages.json || true
          if [ "$status" = "409" ] || [ "$status" = "201" ] || [ "$status" = "204" ]; then
            echo "Pages is enabled (or was already enabled)."
          else
            put_status=$(curl -s -o /tmp/pages_put.json -w "%{http_code}" \
              -X PUT \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/pages" \
              -d '{"build_type":"workflow"}') || true
            echo "PUT /pages → HTTP $put_status"
            cat /tmp/pages_put.json || true
            if [ "$put_status" != "204" ] && [ "$put_status" != "200" ]; then
              echo "::error::Failed to enable Pages via API. Enable manually at https://github.com/$REPO/settings/pages (Source: GitHub Actions)."
              exit 1
            fi
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
